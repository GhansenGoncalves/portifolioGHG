name: Testes E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: Playwright (Bolos da Bru)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bolos-da-bru
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bolos-da-bru/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Rodar suíte E2E
        run: npm test

      - name: Publicar relatório em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: bolos-da-bru/test-results/
          retention-days: 7
